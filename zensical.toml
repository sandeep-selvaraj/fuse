[project]

site_name = "Fuse"
site_description = "Train small LLMs and deploy them for fast structured extraction on CPU"
site_url = "https://sandeep-selvaraj.github.io/fuse/"
site_author = "Sandeep Selvaraj"
repo_url = "https://github.com/sandeep-selvaraj/fuse"
repo_name = "sandeep-selvaraj/fuse"
copyright = "Copyright &copy; 2026 Sandeep Selvaraj"

nav = [
  { "Home" = "index.md" },
  { "Get Started" = "get-started.md" },
  { "Concepts" = "concepts.md" },
  { "Configuration" = [
    { "Inference" = "configuration/inference.md" },
    { "Extraction" = "configuration/extraction.md" },
    { "Training" = "configuration/training.md" },
  ]},
  { "CLI Reference" = "cli-reference.md" },
  { "Supported Models" = "supported-models.md" },
  { "Development" = "development.md" },
]

extra_css = ["stylesheets/extra.css"]

[project.theme]
language = "en"
features = [
    "announce.dismiss",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.sections",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]

[project.theme.font]
text = "Inter"
code = "JetBrains Mono"

[project.theme.icon]
logo = "lucide/zap"
repo = "fontawesome/brands/github"

[[project.theme.palette]]
scheme = "default"
primary = "custom"
accent = "custom"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "custom"
accent = "custom"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/sandeep-selvaraj/fuse"

[[project.extra.social]]
icon = "fontawesome/brands/python"
link = "https://pypi.org/project/fusellm/"
